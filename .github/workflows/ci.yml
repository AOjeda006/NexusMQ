name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela ejecuciones antiguas de la misma rama si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build & test (${{ matrix.preset }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset: [linux-gcc, linux-clang]
    steps:
      - uses: actions/checkout@v4

      - name: Instalar toolchain
        # libc++: el preset linux-clang lo usa para std::expected (ADR-0009).
        # libssl-dev: habilita el plano TLS (find_package(OpenSSL)) y sus tests (I17).
        run: sudo apt-get update && sudo apt-get install -y ninja-build cmake g++ clang libc++-dev libc++abi-dev libssl-dev

      - name: Configurar
        run: cmake --preset ${{ matrix.preset }}

      - name: Compilar (avisos como errores)
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Tests
        run: ctest --preset ${{ matrix.preset }}

  sanitizers:
    name: sanitizers (ASan/UBSan)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Instalar toolchain
        run: sudo apt-get update && sudo apt-get install -y ninja-build cmake g++ libssl-dev

      - name: Configurar (NEXUS_SANITIZERS=ON)
        run: cmake --preset linux-gcc-asan

      - name: Compilar
        run: cmake --build --preset linux-gcc-asan

      - name: Tests bajo sanitizers
        run: ctest --preset linux-gcc-asan

  tsan:
    name: ThreadSanitizer (colas lock-free)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Instalar toolchain
        run: sudo apt-get update && sudo apt-get install -y ninja-build cmake g++ libssl-dev

      - name: Configurar (NEXUS_TSAN=ON)
        run: cmake --preset linux-gcc-tsan

      - name: Compilar
        run: cmake --build --preset linux-gcc-tsan

      - name: Tests bajo ThreadSanitizer
        run: ctest --preset linux-gcc-tsan

  lint:
    name: formato & análisis estático
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Instalar herramientas
        # libc++: clang-tidy parsea con el frontend de clang; necesita libc++ para
        # std::expected (igual que el preset linux-clang).
        run: sudo apt-get update && sudo apt-get install -y ninja-build cmake clang clang-format clang-tidy libc++-dev libc++abi-dev libssl-dev

      - name: clang-format (--dry-run --Werror)
        run: |
          files=$(git ls-files '*.hpp' '*.cpp')
          echo "$files"
          clang-format --dry-run --Werror $files

      - name: Configurar (compile_commands con clang/libc++)
        run: cmake --preset linux-clang

      # Análisis estático del código de dominio (src/). El arnés de bench y los
      # tests usan macros de terceros (BENCHMARK_MAIN, TEST) que el linter atribuye
      # a nuestro fichero; no se analizan para no pelear con código ajeno.
      - name: clang-tidy (código de dominio)
        run: |
          files=$(git ls-files 'src/*.cpp')
          echo "$files"
          clang-tidy -p build/linux-clang $files
